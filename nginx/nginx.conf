upstream backend {
    server backend:8000;
}

upstream frontend {
    server frontend:3000;
}

# ── Auth abuse protection (ADR-0011, ADR-0015) ──
# Edge rate-limit for authentication endpoints. Complements the in-process
# limiter in app/core/rate_limit.py so multi-instance deployments get shared
# abuse protection without adding a shared-store runtime dependency.
# 30 req/min per client IP with a small burst to absorb UX retries.
limit_req_zone $binary_remote_addr zone=auth_zone:10m rate=30r/m;
limit_req_status 429;

# ── CORS origin whitelist ──
# Only origins in this map receive Access-Control-Allow-Origin.
# Add production domains here.
map $http_origin $cors_origin {
    default "";
    "http://localhost"        $http_origin;
    "http://localhost:3000"   $http_origin;
    "http://localhost:80"     $http_origin;
    "http://127.0.0.1"       $http_origin;
    "http://127.0.0.1:3000"  $http_origin;
    "http://127.0.0.1:80"    $http_origin;
}

server {
    listen 80;
    server_name localhost;
    client_max_body_size 50M;

    # ── Global security headers ──
    add_header X-Content-Type-Options  "nosniff" always;
    add_header X-Frame-Options         "DENY" always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; img-src 'self' data: blob: https://cdn.jsdelivr.net; font-src 'self' data: https://cdn.jsdelivr.net; connect-src 'self'" always;
    add_header X-XSS-Protection       "1; mode=block" always;

    # SSE stream — disable buffering for real-time events
    location /api/v1/events/stream {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400;
        proxy_set_header Connection '';
        chunked_transfer_encoding off;
    }

    # SCR — progreso de análisis (SSE)
    location ~ ^/api/v1/code_security_reviews/[^/]+/stream$ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400;
        proxy_set_header Connection '';
    }

    # Next.js BFF auth routes (set HttpOnly cookies, then proxy to /api/v1/)
    location /api/auth/ {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Auth endpoints — rate-limited at the edge (ADR-0011, ADR-0015).
    # Regex location beats the /api/ prefix match for these three paths.
    location ~ ^/api/v1/auth/(login|register|refresh)$ {
        limit_req zone=auth_zone burst=10 nodelay;

        add_header Access-Control-Allow-Origin  $cors_origin always;
        add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-CSRF-Token" always;
        add_header Access-Control-Allow-Credentials "true" always;

        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  $cors_origin;
            add_header Access-Control-Allow-Methods "POST, OPTIONS";
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-CSRF-Token";
            add_header Access-Control-Allow-Credentials "true";
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }

        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API requests → FastAPI
    location /api/ {
        # ── CORS headers (only for whitelisted origins) ──
        add_header Access-Control-Allow-Origin  $cors_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PATCH, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-CSRF-Token" always;
        add_header Access-Control-Allow-Credentials "true" always;

        # Preflight
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  $cors_origin;
            add_header Access-Control-Allow-Methods "GET, POST, PATCH, PUT, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-CSRF-Token";
            add_header Access-Control-Allow-Credentials "true";
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }

        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # AI endpoints can take 2+ minutes; avoid premature 504
        proxy_read_timeout 300;
        proxy_connect_timeout 10;
        proxy_send_timeout 300;
    }

    # OpenAPI docs
    location /docs {
        proxy_pass http://backend;
        proxy_set_header Host $host;
    }

    location /docs/oauth2-redirect {
        proxy_pass http://backend;
        proxy_set_header Host $host;
    }

    location /redoc {
        proxy_pass http://backend;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://backend;
    }

    # Uploaded files
    location /uploads/ {
        alias /usr/share/nginx/html/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Everything else → Next.js
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
