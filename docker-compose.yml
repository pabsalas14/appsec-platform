services:
  # ──────────────────────────────────
  # PostgreSQL 16
  # ──────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: framework_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-framework}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-framework_secret}
      POSTGRES_DB: ${POSTGRES_DB:-framework}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # ports removed — access postgres via: docker compose exec postgres psql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-framework}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ──────────────────────────────────
  # Backend - Python FastAPI
  # ──────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: framework_backend
    restart: unless-stopped
    # Linux (Ubuntu servidor): resuelve host.docker.internal → máquina host (p. ej. Ollama fuera de Docker)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER:-framework}:${POSTGRES_PASSWORD:-framework_secret}@postgres:5432/${POSTGRES_DB:-framework}"
      CELERY_BROKER_URL: "${CELERY_BROKER_URL:-redis://redis:6379/0}"
      CELERY_RESULT_BACKEND: "${CELERY_RESULT_BACKEND:-redis://redis:6379/0}"
      ENV: "${ENV:-dev}"
      SECRET_KEY: "${SECRET_KEY:?SECRET_KEY must be set}"
      APPSEC_MASTER_KEY: "${APPSEC_MASTER_KEY:?APPSEC_MASTER_KEY must be set}"
      JWT_ALGORITHM: "${JWT_ALGORITHM:-HS256}"
      JWT_ACCESS_EXPIRE_MINUTES: "${JWT_ACCESS_EXPIRE_MINUTES:-30}"
      JWT_REFRESH_EXPIRE_DAYS: "${JWT_REFRESH_EXPIRE_DAYS:-7}"
      CORS_ORIGINS: "${CORS_ORIGINS:-http://localhost:3000,http://localhost,http://localhost:80,http://127.0.0.1,http://127.0.0.1:3000,http://127.0.0.1:80}"
      ADMIN_EMAIL: "${ADMIN_EMAIL:?ADMIN_EMAIL must be set}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:?ADMIN_PASSWORD must be set}"
      # Seed en arranque: solo si RUN_SEED=true en el .env del host (por defecto omitido → false).
      # Nueva env para el backend: duplica la línea arriba del compose + entrada en .env.example + Settings si aplica.
      RUN_SEED: "${RUN_SEED:-false}"
      SEED_DEMO_BUSINESS: "${SEED_DEMO_BUSINESS:-false}"
      WEBHOOK_URL: "${WEBHOOK_URL:-}"
      WEBHOOK_TYPE: "${WEBHOOK_TYPE:-slack}"
      SLA_ALERT_DAYS: "${SLA_ALERT_DAYS:-5}"
      SSE_ENABLED: "${SSE_ENABLED:-true}"
      SSE_KEEPALIVE_INTERVAL: "${SSE_KEEPALIVE_INTERVAL:-30}"
      SCR_GITHUB_TOKEN: "${SCR_GITHUB_TOKEN:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OLLAMA_BASE_URL: "${OLLAMA_BASE_URL:-http://host.docker.internal:11434}"
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - uploads:/app/uploads
    command: >
      sh -c "
        echo '📦 Running migrations...' &&
        alembic upgrade heads &&
        if [ \"$$RUN_SEED\" = 'true' ]; then
          echo '🌱 Running seed...' &&
          python -m app.seed;
        else
          echo '⏭️  Seed skipped (RUN_SEED!=true)';
        fi &&
        echo '🚀 Starting server in DEV mode...' &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "

  # ──────────────────────────────────
  # Redis — broker Celery (cola SCR y otras tareas)
  # ──────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: framework_redis
    restart: unless-stopped
    # Puerto host 16379 evita choque con Redis del sistema (6379). Dentro de la red Compose
    # los servicios siguen usando redis:6379 (CELERY_* / REDIS_URL sin cambios).
    ports:
      - "${REDIS_PUBLISH_PORT:-16379}:6379"

  # ──────────────────────────────────
  # Celery worker — pipeline SCR (Inspector → Detective → Fiscal)
  # ──────────────────────────────────
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: framework_celery
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER:-framework}:${POSTGRES_PASSWORD:-framework_secret}@postgres:5432/${POSTGRES_DB:-framework}"
      CELERY_BROKER_URL: "${CELERY_BROKER_URL:-redis://redis:6379/0}"
      CELERY_RESULT_BACKEND: "${CELERY_RESULT_BACKEND:-redis://redis:6379/0}"
      ENV: "${ENV:-dev}"
      SECRET_KEY: "${SECRET_KEY:?SECRET_KEY must be set}"
      APPSEC_MASTER_KEY: "${APPSEC_MASTER_KEY:?APPSEC_MASTER_KEY must be set}"
      ADMIN_EMAIL: "${ADMIN_EMAIL:?ADMIN_EMAIL must be set}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:?ADMIN_PASSWORD must be set}"
      SCR_GITHUB_TOKEN: "${SCR_GITHUB_TOKEN:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OLLAMA_BASE_URL: "${OLLAMA_BASE_URL:-http://host.docker.internal:11434}"
    volumes:
      - ./backend:/app
      - uploads:/app/uploads
    working_dir: /app
    command: celery -A celery_app worker --loglevel=info

  # ──────────────────────────────────
  # Frontend - Next.js TypeScript
  # ──────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
        NEXT_PUBLIC_SSE_ENABLED: ${SSE_ENABLED:-true}
    container_name: framework_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

  # ──────────────────────────────────
  # Nginx (reverse proxy + static)
  # ──────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: framework_nginx
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - uploads:/usr/share/nginx/html/uploads:ro
    ports:
      - "80:80"

volumes:
  postgres_data:
  uploads:
