name: CI/Core

on:
  push:
    branches: [main, frontend-testing]
  pull_request:
    branches: [main, frontend-testing]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "22"

jobs:
  lint:
    name: Lint (ruff + eslint + tsc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Lint backend (ruff)
        working-directory: backend
        run: |
          pip install -r requirements.txt
          ruff check .
          ruff format --check .

      - name: Lint frontend (eslint + tsc)
        working-directory: frontend
        run: |
          npm ci
          npm run lint

      - name: Check dead code frontend (knip)
        working-directory: frontend
        run: npx knip --strict

  security:
    name: Security (pip-audit + vulture)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Security audit (pip-audit)
        working-directory: backend
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt

      - name: Dead code backend (vulture)
        working-directory: backend
        run: |
          pip install vulture
          vulture app --min-confidence 80

  test-frontend:
    name: Frontend Tests (vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run unit/component tests
        working-directory: frontend
        run: npm run test:run -- --coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: ./frontend/coverage/coverage-final.json
          flags: unittests
          fail_ci_if_error: false

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: frontend-coverage
          path: frontend/coverage/

  build:
    name: Build (Frontend Next.js)
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: ""
        run: npm run build
