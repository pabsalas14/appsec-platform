name: CI/Tests

on:
  push:
    branches: [main, frontend-testing]
  pull_request:
    branches: [main, frontend-testing]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"
  APPSEC_MASTER_KEY: "bOEizITi-HIjCc8gIlF3FMfwidr6I0z7RFGXJdfizwU="

jobs:
  # ─── LINT ────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff + eslint + tsc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Lint backend (ruff)
        working-directory: backend
        run: |
          pip install -r requirements.txt
          ruff check .
          ruff format --check .

      - name: Lint frontend (eslint + tsc)
        working-directory: frontend
        run: |
          npm ci
          npm run lint

      - name: Check dead code frontend (knip)
        working-directory: frontend
        run: npx knip --strict

  # ─── SECURITY ────────────────────────────────────────────────────────────
  security:
    name: Security (pip-audit + vulture)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Security audit (pip-audit)
        working-directory: backend
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt

      - name: Dead code backend (vulture)
        working-directory: backend
        run: |
          pip install vulture
          vulture app --min-confidence 80

  # ─── BACKEND TESTS ───────────────────────────────────────────────────────
  test-backend:
    name: Backend Tests (pytest + coverage)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: framework
          POSTGRES_PASSWORD: framework_secret
          POSTGRES_DB: framework
        ports: ["5432:5432"]
        options: >-
          --health-cmd="pg_isready -U framework"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    env:
      DATABASE_URL: postgresql+asyncpg://framework:framework_secret@localhost:5432/framework
      SECRET_KEY: "ci_secret_${{ github.run_id }}_padding_to_reach_32_chars"
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: Testpassword123
      ENV: dev
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Apply migrations
        working-directory: backend
        run: alembic upgrade head

      - name: Run tests with coverage (68% gate)
        working-directory: backend
        env:
          PYTEST_ALLOW_ANY_DB: "1"
        run: pytest --cov=app --cov-report=term --cov-report=xml --cov-fail-under=68 tests/

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml

  # ─── FRONTEND TESTS ──────────────────────────────────────────────────────
  test-frontend:
    name: Frontend Tests (vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run unit/component tests
        working-directory: frontend
        run: npm run test:run -- --coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./frontend/coverage/coverage-final.json
          flags: unittests
          fail_ci_if_error: false

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/

  # ─── BUILD ───────────────────────────────────────────────────────────────
  build:
    name: Build (Frontend Next.js)
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: ""
        run: npm run build

  # ─── TYPE DRIFT ──────────────────────────────────────────────────────────
  drift-types:
    name: Type Drift Check (backend vs frontend)
    runs-on: ubuntu-latest
    needs: [test-backend, build]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: framework
          POSTGRES_PASSWORD: framework_secret
          POSTGRES_DB: framework
        ports: ["5432:5432"]
        options: >-
          --health-cmd="pg_isready -U framework"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    env:
      DATABASE_URL: postgresql+asyncpg://framework:framework_secret@localhost:5432/framework
      SECRET_KEY: "ci_secret_${{ github.run_id }}_padding_to_reach_32_chars"
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: Testpassword123
      ENV: dev
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend deps
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Apply migrations
        working-directory: backend
        run: alembic upgrade head

      - name: Start backend
        working-directory: backend
        run: |
          nohup uvicorn app.main:app --host 127.0.0.1 --port 8000 > uvicorn.log 2>&1 &
          for i in {1..30}; do
            if curl -fs http://127.0.0.1:8000/api/health >/dev/null; then
              echo "backend ready"; exit 0
            fi
            sleep 1
          done
          echo "backend failed to start"; tail -n 100 uvicorn.log; exit 1

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Regenerate types
        working-directory: frontend
        run: npx openapi-typescript http://127.0.0.1:8000/openapi.json -o /tmp/api.ts

      - name: Compare with committed types
        run: |
          if ! diff -u frontend/src/types/api.ts /tmp/api.ts; then
            echo "::error::Generated types drift from committed file. Run 'make types' and commit."
            exit 1
          fi

  # ─── E2E TESTS ───────────────────────────────────────────────────────────
  test-e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [test-backend, build]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: framework
          POSTGRES_PASSWORD: framework_secret
          POSTGRES_DB: framework
        ports: ["5432:5432"]
        options: >-
          --health-cmd="pg_isready -U framework"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    env:
      DATABASE_URL: postgresql+asyncpg://framework:framework_secret@localhost:5432/framework
      SECRET_KEY: "ci_secret_${{ github.run_id }}_padding_to_reach_32_chars"
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: Changeme123!
      RUN_SEED: "true"
      # Playwright hits /auth/login once per test via APIRequestContext — raise CI ceiling
      AUTH_LOGIN_RATE_LIMIT_PER_MIN: "10000"
      NEXT_PUBLIC_API_URL: ""
      E2E_BASE_URL: "http://127.0.0.1:3000"
      E2E_API_URL: "http://127.0.0.1:8000"
      E2E_USERNAME: admin
      E2E_PASSWORD: Changeme123!
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend deps
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Apply migrations + seed
        working-directory: backend
        run: |
          alembic upgrade head
          python -m app.seed

      - name: Start backend
        working-directory: backend
        run: |
          nohup uvicorn app.main:app --host 127.0.0.1 --port 8000 > uvicorn.log 2>&1 &
          for i in {1..30}; do
            if curl -fs http://127.0.0.1:8000/api/health >/dev/null; then
              echo "backend ready"; exit 0
            fi
            sleep 1
          done
          echo "backend failed to start"; tail -n 100 uvicorn.log; exit 1

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Start frontend
        working-directory: frontend
        run: |
          nohup npm run start -- -p 3000 > next.log 2>&1 &
          for i in {1..30}; do
            if curl -fs http://127.0.0.1:3000 >/dev/null; then
              echo "frontend ready"; exit 0
            fi
            sleep 1
          done
          echo "frontend failed to start"; tail -n 100 next.log; exit 1

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: frontend
        run: npx playwright test

      - name: Upload playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report
          retention-days: 7
