name: CI/Backend

on:
  push:
    branches: [main, frontend-testing]
  pull_request:
    branches: [main, frontend-testing]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  APPSEC_MASTER_KEY: "bOEizITi-HIjCc8gIlF3FMfwidr6I0z7RFGXJdfizwU="

jobs:
  test-backend:
    name: Backend Tests (pytest + coverage)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: framework
          POSTGRES_PASSWORD: framework_secret
          POSTGRES_DB: framework
        ports: ["5432:5432"]
        options: >-
          --health-cmd="pg_isready -U framework"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    env:
      DATABASE_URL: postgresql+asyncpg://framework:framework_secret@localhost:5432/framework
      SECRET_KEY: "ci_secret_${{ github.run_id }}_padding_to_reach_32_chars"
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: Testpassword123
      ENV: dev
    steps:
      - uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Apply migrations
        working-directory: backend
        run: alembic upgrade heads

      - name: Run tests with coverage (68% gate)
        working-directory: backend
        env:
          PYTEST_ALLOW_ANY_DB: "1"
        run: pytest --cov=app --cov-report=term --cov-report=xml --cov-fail-under=68 tests/

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml
