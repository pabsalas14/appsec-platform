name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"
  # Settings + Alembic; Fernet 32-byte key (A5). Public CI-only; do not use in production.
  APPSEC_MASTER_KEY: "bOEizITi-HIjCc8gIlF3FMfwidr6I0z7RFGXJdfizwU="

jobs:
  # ─── Backend ─────────────────────────────────────────────────────────────
  lint-backend:
    name: Lint backend (ruff)
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: backend } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -r requirements.txt
      - run: ruff check .
      - run: ruff format --check .

  test-backend:
    name: Test backend (pytest + coverage 70%)
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: backend } }
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: framework
          POSTGRES_PASSWORD: framework_secret
          POSTGRES_DB: framework
        ports: ["5432:5432"]
        options: >-
          --health-cmd="pg_isready -U framework"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    env:
      DATABASE_URL: postgresql+asyncpg://framework:framework_secret@localhost:5432/framework
      SECRET_KEY: "ci_secret_${{ github.run_id }}_padding_to_reach_32_chars"
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: Testpassword123
      ENV: dev
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -r requirements.txt
      - name: Apply migrations
        run: alembic upgrade head
      - name: Run tests with coverage gate
        env:
          # Ephemeral Postgres service — safe to TRUNCATE between tests.
          PYTEST_ALLOW_ANY_DB: "1"
        run: pytest --cov=app --cov-report=term --cov-report=xml --cov-fail-under=70 tests/
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage.xml

  security-backend:
    name: Security audit (pip-audit)
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: backend } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install pip-audit
      - run: pip-audit -r requirements.txt

  dead-code-backend:
    name: Dead code backend (vulture)
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: backend } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install vulture
      - run: vulture app --min-confidence 80

  # ─── Frontend ────────────────────────────────────────────────────────────
  lint-frontend:
    name: Lint frontend (eslint + tsc)
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: frontend } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint

  build-frontend:
    name: Build frontend
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: frontend } }
    env:
      NEXT_PUBLIC_API_URL: ""
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build

  test-frontend:
    name: Test frontend (vitest)
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: frontend } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run test:run

  dead-code-frontend:
    name: Dead code frontend (knip)
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: frontend } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx knip --strict

  # ─── Type drift (backend vs frontend) ────────────────────────────────────
  drift-types:
    name: Type drift (openapi-typescript)
    runs-on: ubuntu-latest
    needs: [test-backend]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: framework
          POSTGRES_PASSWORD: framework_secret
          POSTGRES_DB: framework
        ports: ["5432:5432"]
        options: >-
          --health-cmd="pg_isready -U framework"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    env:
      DATABASE_URL: postgresql+asyncpg://framework:framework_secret@localhost:5432/framework
      SECRET_KEY: "ci_secret_${{ github.run_id }}_padding_to_reach_32_chars"
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: Testpassword123
      ENV: dev
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install backend deps
        working-directory: backend
        run: pip install -r requirements.txt
      - name: Apply migrations
        working-directory: backend
        run: alembic upgrade head
      - name: Start backend
        working-directory: backend
        run: |
          nohup uvicorn app.main:app --host 127.0.0.1 --port 8000 > uvicorn.log 2>&1 &
          for i in {1..30}; do
            if curl -fs http://127.0.0.1:8000/api/health >/dev/null; then
              echo "backend ready"; exit 0
            fi
            sleep 1
          done
          echo "backend failed to start"; tail -n 100 uvicorn.log; exit 1
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci
      - name: Regenerate types
        working-directory: frontend
        run: npx openapi-typescript http://127.0.0.1:8000/openapi.json -o /tmp/api.ts
      - name: Compare with committed types
        run: |
          if ! diff -u frontend/src/types/api.ts /tmp/api.ts; then
            echo "::error::Generated types drift from committed file. Run 'make types' and commit."
            exit 1
          fi

  # ─── End-to-end (Playwright) ─────────────────────────────────────────────
  e2e:
    name: E2E (Playwright Login → CRUD)
    runs-on: ubuntu-latest
    needs: [test-backend, build-frontend]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: framework
          POSTGRES_PASSWORD: framework_secret
          POSTGRES_DB: framework
        ports: ["5432:5432"]
        options: >-
          --health-cmd="pg_isready -U framework"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    env:
      DATABASE_URL: postgresql+asyncpg://framework:framework_secret@localhost:5432/framework
      SECRET_KEY: "ci_secret_${{ github.run_id }}_padding_to_reach_32_chars"
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: Changeme123!
      RUN_SEED: "true"
      NEXT_PUBLIC_API_URL: ""
      E2E_BASE_URL: "http://127.0.0.1:3000"
      E2E_USERNAME: admin@example.com
      E2E_PASSWORD: Changeme123!
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend deps
        working-directory: backend
        run: pip install -r requirements.txt
      - name: Apply migrations + seed
        working-directory: backend
        run: |
          alembic upgrade head
          python -m app.seed
      - name: Start backend
        working-directory: backend
        run: |
          nohup uvicorn app.main:app --host 127.0.0.1 --port 8000 > uvicorn.log 2>&1 &
          for i in {1..30}; do
            if curl -fs http://127.0.0.1:8000/api/health >/dev/null; then
              echo "backend ready"; exit 0
            fi
            sleep 1
          done
          echo "backend failed to start"; tail -n 100 uvicorn.log; exit 1

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci
      - name: Build frontend
        working-directory: frontend
        run: npm run build
      - name: Start frontend
        working-directory: frontend
        run: |
          nohup npm run start -- -p 3000 > next.log 2>&1 &
          for i in {1..30}; do
            if curl -fs http://127.0.0.1:3000 >/dev/null; then
              echo "frontend ready"; exit 0
            fi
            sleep 1
          done
          echo "frontend failed to start"; tail -n 100 next.log; exit 1

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium firefox
      - name: Run Playwright tests
        working-directory: frontend
        run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report
          retention-days: 7
